name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc -b

      - name: Typecheck app
        working-directory: app
        run: npx tsc -p tsconfig.json --noEmit

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Test app
        working-directory: app
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build app
        working-directory: app
        run: npm run build
